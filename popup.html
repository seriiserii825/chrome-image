<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 600;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    #toggleBtn {
      background: #2563eb;
      color: #fff;
    }
    #toggleBtn:hover { background: #1d4ed8; }
    #toggleBtn.active {
      background: #dc2626;
    }
    #toggleBtn.active:hover { background: #b91c1c; }
    #status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Image Inspector</h2>
  <button id="toggleBtn">Show Image Info</button>
  <div id="status">Click to inspect images on this page</div>
  <script src="popup.js"></script>
</body>
</html>
